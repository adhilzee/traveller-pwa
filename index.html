<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#ffffff" />
    <title>Travel</title>
    <link rel="stylesheet" href="css/style.css" type="text/css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:image" content="" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body>
    <section class="wrapper">
      <header>
        <div class="left">
          <h1>
            <a href="index.html"><img src="images/logo.svg" alt="Image" /></a>
          </h1>
        </div>
        <div class="right">
          <button class="button" id="install-button">Install</button>
          <button class="button" id="save-page" style="display: block">
            Save Page
          </button>
          <!-- <form>
            <img src="images/search.svg" alt="Image" />
            <input type="search" placeholder="Search.." />
          </form> -->
        </div>
      </header>
      <div class="head">
        <h2>Welcome John Doe</h2>
        <p>Explore the world around you</p>
        <ul></ul>
      </div>
      <div class="items"></div>
    </section>

    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
    <script>
      let save_button = document.getElementById("save-page");
      save_button.addEventListener("click", (event) => {
        if ("caches" in window) {
          caches.open("user-saved").then((cache) => {
            cache.add("https://traveller.talrop.works/api/v1/places/");
            cache.add(
              "https://traveller.talrop.works/api/v1/places/categories/",
            );
          });
          caches.open("save-page").then((cache) => {
            $.ajax({
              url: "https://traveller.talrop.works/api/v1/places/categories/",
              success: function (response) {
                let categories = response.data;
                let images = categories.map((category) => category.image);

                images.forEach((image) => {
                  fetch(image, { mode: "no-cors" })
                    .then((response) => {
                      if (response) {
                        return cache.put(image, response);
                      }
                      throw new Error("Network response was not ok.");
                    })
                    .catch((error) => {
                      console.error(
                        `Failed to fetch and cache image (${image}):`,
                        error,
                      );
                    });
                });
              },
              error: function (error) {
                console.error("Error fetching categories:", error);
              },
            });
            $.ajax({
              url: "https://traveller.talrop.works/api/v1/places/",
              success: function (response) {
                let places = response.data;
                let images = places.map((place) => place.image);

                images.forEach((image) => {
                  fetch(image, { mode: "no-cors" })
                    .then((response) => {
                      if (response) {
                        return cache.put(image, response);
                      }
                      throw new Error("Network response was not ok.");
                    })
                    .catch((error) => {
                      console.error(
                        `Failed to fetch and cache image (${image}):`,
                        error,
                      );
                    });
                });
              },
              error: function (error) {
                console.error("Error fetching places :", error);
              },
            });
          });
        } else {
          console.error("Caches API not available in this browser.");
        }
      });
    </script>
  </body>
</html>
